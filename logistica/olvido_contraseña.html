<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>Recuperar Contraseña</title>
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        .g-recaptcha {
            display: flex;
            justify-content: center;
            margin: 10px 0;
        }

        .error-recaptcha {
            color: red;
            text-align: center;
            font-size: 14px;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
<header>
    <div class="container-logo" style="text-align:center; margin-top:15px;">
        <img src="imagenes/logo_empresa.png" alt="logo" style="border-radius:50%; width:80px; height:70px;">
    </div>
</header>

<form id="formRecuperar" class="formulario" action="enviar_correo.php" method="POST">
    <h1 style="text-align:center;">Recuperar Contraseña</h1>
    <div class="contenedor">
        <div class="input-contenedor">
            <i class="fa-solid fa-user"></i>
            <input type="text" name="dato" placeholder="Ingresa tu usuario o correo" required />
        </div>

        <!-- reCAPTCHA -->
        <div class="g-recaptcha" data-sitekey="6LdwqAMsAAAAAC1OZhKj6hNjDZo25-FkAmZY1omX"></div>
        <div class="error-recaptcha" id="errorRecaptcha">Por favor, verifica el reCAPTCHA.</div>

        <input type="submit" value="Enviar enlace" class="button" />

        <div style="text-align:center; margin: 10px 0;">
            ¿Recordaste tu contraseña? 
            <a href="LoginCamiones.php" style="color:#00aaaa; text-decoration:none;">Inicia sesión</a>
        </div>
    </div>
</form>

<script>
document.getElementById("formRecuperar").addEventListener("submit", function(e) {
    const respuesta = grecaptcha.getResponse();
    const errorDiv = document.getElementById("errorRecaptcha");
    
    if (respuesta.length === 0) {
        e.preventDefault();
        errorDiv.style.display = "block";
    } else {
        errorDiv.style.display = "none";
    }
});
</script>
</body>
</html>
